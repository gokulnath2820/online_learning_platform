<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login – NexLearn</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Orbitron:wght@500;700&family=Roboto+Mono:wght@400;500&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg-primary:        #0a0824;
      --bg-secondary:      #14113a;
      --bg-tertiary:       #1e1a52;
      --surface:           rgba(20, 17, 58, 0.76);
      --surface-heavy:     rgba(30, 26, 82, 0.92);
      --accent:            #00eaff;
      --accent-glow:       rgba(0, 234, 255, 0.40);
      --accent-dark:       #00c0d8;
      --purple:            #c084fc;
      --purple-glow:       rgba(192, 132, 252, 0.40);
      --purple-dark:       #a855f7;
      --text-primary:      #f1f1ff;
      --text-secondary:    #c3c3e8;
      --text-tertiary:     #8a8ab8;
      --glass:             rgba(255,255,255,0.075);
      --glass-border:      rgba(255,255,255,0.135);
      --border-radius:     24px;
      --border-radius-lg:  34px;
      --border-radius-xl:  44px;
      --shadow-soft:       0 18px 60px rgba(0,0,0,0.52);
      --shadow-glow:       0 0 80px var(--accent-glow);
      --transition:        all 0.48s cubic-bezier(0.16, 1, 0.3, 1);
      --transition-fast:   all 0.32s ease;
    }

    [data-theme="light"] {
      --bg-primary:        #fafcff;
      --bg-secondary:      #f2f6ff;
      --bg-tertiary:       #e6ecff;
      --surface:           rgba(255, 255, 255, 0.92);
      --surface-heavy:     rgba(250, 255, 255, 1.00);
      --text-primary:      #1a1a4a;
      --text-secondary:    #3a3a7a;
      --text-tertiary:     #5a5a9a;
      --glass:             rgba(255,255,255,0.90);
      --glass-border:      rgba(50,50,220,0.28);
      --accent:            #002244;
      --accent-glow:       rgba(0,34,68,0.32);
      --purple:            #7c3aed;
      --purple-glow:       rgba(124,58,237,0.28);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: linear-gradient(150deg, var(--bg-primary), #221a54 70%, var(--bg-primary));
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
    }

    header {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 1000;
      backdrop-filter: blur(26px) saturate(230%);
      -webkit-backdrop-filter: blur(26px) saturate(230%);
      background: var(--glass);
      border-bottom: 1px solid var(--glass-border);
    }

    nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      height: 90px;
      max-width: 1680px;
      margin: 0 auto;
      padding: 0 40px;
    }

    .logo {
      font-family: 'Orbitron', sans-serif;
      font-size: 2.6rem;
      font-weight: 700;
      letter-spacing: 2.5px;
      background: linear-gradient(90deg, var(--accent), var(--purple), var(--accent));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      background-size: 300% auto;
      animation: gradientFlow 18s linear infinite;
    }

    @keyframes gradientFlow {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .nav-right {
      display: flex;
      align-items: center;
      gap: 3.2rem;
    }

    .nav-link {
      color: var(--text-secondary);
      text-decoration: none;
      font-weight: 500;
      font-size: 1.18rem;
      transition: var(--transition);
    }

    .nav-link:hover {
      color: var(--accent);
    }

    .icon-btn {
      background: var(--glass);
      border: 1px solid var(--glass-border);
      color: var(--accent);
      width: 54px;
      height: 54px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: var(--transition);
      backdrop-filter: blur(18px);
    }

    .icon-btn:hover {
      background: var(--accent-glow);
      transform: translateY(-7px) scale(1.18);
      box-shadow: 0 0 44px var(--accent-glow);
    }

    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 140px 40px 80px;
    }

    .auth-container {
      width: 100%;
      max-width: 520px;
      background: var(--surface-heavy);
      border-radius: var(--border-radius-xl);
      padding: 4.5rem 3.8rem;
      border: 1px solid var(--glass-border);
      backdrop-filter: blur(20px);
      box-shadow: var(--shadow-soft), var(--shadow-glow);
      position: relative;
      overflow: hidden;
    }

    .auth-container::before {
      content: '';
      position: absolute;
      inset: -50%;
      background: radial-gradient(circle at 20% 30%, var(--accent-glow), transparent 70%);
      opacity: 0.4;
      pointer-events: none;
      animation: pulseGlow 12s ease-in-out infinite;
    }

    @keyframes pulseGlow {
      0%,100% { opacity: 0.3; transform: scale(1); }
      50%     { opacity: 0.6; transform: scale(1.15); }
    }

    .auth-header {
      text-align: center;
      margin-bottom: 3.5rem;
    }

    .auth-title {
      font-family: 'Orbitron', sans-serif;
      font-size: 3.8rem;
      background: linear-gradient(90deg, var(--accent), var(--purple));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin-bottom: 0.8rem;
    }

    .auth-subtitle {
      font-size: 1.28rem;
      color: var(--text-secondary);
    }

    .form-group {
      position: relative;
      margin-bottom: 2.6rem;
    }

    .form-input {
      width: 100%;
      padding: 1.4rem 1.6rem;
      background: var(--glass);
      border: 1px solid var(--glass-border);
      border-radius: 18px;
      color: var(--text-primary);
      font-size: 1.15rem;
      transition: var(--transition);
      backdrop-filter: blur(12px);
    }

    .form-input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 5px var(--accent-glow);
      transform: translateY(-2px);
    }

    .floating-label {
      position: absolute;
      left: 1.6rem;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-tertiary);
      font-size: 1.15rem;
      pointer-events: none;
      transition: var(--transition);
    }

    .form-input:focus + .floating-label,
    .form-input:not(:placeholder-shown) + .floating-label {
      top: -0.8rem;
      left: 1.2rem;
      font-size: 0.95rem;
      padding: 0 0.6rem;
      background: var(--bg-primary);
      color: var(--accent);
    }

    .password-toggle {
      position: absolute;
      right: 1.6rem;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-tertiary);
      cursor: pointer;
      font-size: 1.3rem;
    }

    .options-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin: 1.8rem 0 2.8rem;
      font-size: 1rem;
      color: var(--text-secondary);
    }

    .remember-me {
      display: flex;
      align-items: center;
      gap: 0.8rem;
    }

    .checkbox {
      width: 20px;
      height: 20px;
      accent-color: var(--accent);
    }

    .forgot-link {
      color: var(--accent);
      text-decoration: none;
      transition: var(--transition);
    }

    .forgot-link:hover {
      color: var(--purple);
      text-decoration: underline;
    }

    .auth-btn {
      width: 100%;
      padding: 1.4rem;
      border-radius: 60px;
      background: linear-gradient(45deg, var(--accent), var(--purple));
      color: #000;
      font-size: 1.28rem;
      font-weight: 700;
      border: none;
      cursor: pointer;
      transition: var(--transition);
      box-shadow: 0 20px 52px var(--accent-glow);
    }

    .auth-btn:hover {
      transform: translateY(-8px) scale(1.04);
      box-shadow: 0 40px 100px var(--accent-glow);
    }

    .divider {
      display: flex;
      align-items: center;
      margin: 3rem 0;
      color: var(--text-tertiary);
    }

    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--glass-border);
    }

    .divider span {
      padding: 0 1.8rem;
    }

    .social-btn {
      width: 100%;
      padding: 1.2rem;
      margin-bottom: 1.2rem;
      border-radius: 18px;
      background: var(--glass);
      border: 1px solid var(--glass-border);
      color: var(--text-primary);
      font-size: 1.1rem;
      cursor: pointer;
      transition: var(--transition);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      backdrop-filter: blur(14px);
    }

    .social-btn:hover {
      background: var(--accent-glow);
      transform: translateY(-4px);
      box-shadow: 0 0 32px var(--accent-glow);
    }

    .register-prompt {
      text-align: center;
      margin-top: 2.5rem;
      font-size: 1.1rem;
      color: var(--text-secondary);
    }

    .register-link {
      color: var(--accent);
      text-decoration: none;
      font-weight: 600;
      transition: var(--transition);
    }

    .register-link:hover {
      color: var(--purple);
      text-decoration: underline;
    }

    .error-message {
      color: #ff6b6b;
      font-size: 0.95rem;
      margin-top: 0.6rem;
      display: none;
    }

    @media (max-width: 768px) {
      nav { flex-direction: column; height: auto; padding: 2rem 0; }
      .nav-right { margin-top: 1.5rem; }
      .auth-container { padding: 3.5rem 2.5rem; margin: 0 1.5rem; }
      .auth-title { font-size: 3rem; }
    }
  </style>
</head>
<body>

  <!-- HEADER -->
  <header>
    <nav>
      <a href="index.html" class="logo">NexLearn</a>

      <div class="nav-right">
        <a href="register.html" class="nav-link">Sign Up</a>

        <button class="icon-btn" onclick="toggleTheme()" title="Toggle theme">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="5"></circle>
            <line x1="12" y1="1" x2="12" y2="3"></line>
            <line x1="12" y1="21" x2="12" y2="23"></line>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
            <line x1="1" y1="12" x2="3" y2="12"></line>
            <line x1="21" y1="12" x2="23" y2="12"></line>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
          </svg>
        </button>
      </div>
    </nav>
  </header>

  <main>

    <div class="auth-container">

      <div class="auth-header">
        <h1 class="auth-title">Welcome Back</h1>
        <p class="auth-subtitle">Sign in to continue your learning journey</p>
      </div>

      <form id="loginForm" novalidate>

        <div class="form-group">
          <input type="email" id="email" class="form-input" placeholder=" " required autocomplete="email">
          <label for="email" class="floating-label">Email address</label>
          <div class="error-message" id="emailError">Please enter a valid email</div>
        </div>

        <div class="form-group">
          <input type="password" id="password" class="form-input" placeholder=" " required minlength="8">
          <label for="password" class="floating-label">Password</label>
          <span class="password-toggle" onclick="togglePassword()">👁️</span>
          <div class="error-message" id="passwordError">Password must be at least 8 characters</div>
        </div>

        <div class="options-row">
          <label class="remember-me">
            <input type="checkbox" class="checkbox">
            <span>Remember me</span>
          </label>
          <a href="#" class="forgot-link">Forgot password?</a>
        </div>

        <button type="submit" class="auth-btn">Sign In</button>
      </form>

      <div class="divider"><span>or continue with</span></div>

      <button class="social-btn">
        <svg width="24" height="24" viewBox="0 0 24 24"><path fill="currentColor" d="M12.24 10.285V14.4h6.806c-.275 1.765-2.056 5.174-6.806 5.174-4.095 0-7.44-3.39-7.44-7.57s3.345-7.57 7.44-7.57c2.33 0 3.916.89 4.822 1.658l3.28-3.16C18.045 1.92 15.38 0 12.24 0c-6.635 0-12 5.365-12 12s5.365 12 12 12c6.926 0 11.52-4.87 11.52-11.74 0-.79-.085-1.39-.185-1.99H12.24z"/></svg>
        Google
      </button>

      <button class="social-btn">
        <svg width="24" height="24" viewBox="0 0 24 24"><path fill="currentColor" d="M22.675 0h-21.35c-.732 0-1.325.593-1.325 1.325v21.351c0 .731.593 1.324 1.325 1.324h11.495v-9.294h-3.128v-3.622h3.128v-2.672c0-3.1 1.893-4.788 4.659-4.788 1.325 0 2.463.099 2.795.143v3.24l-1.918.001c-1.504 0-1.795.715-1.795 1.763v2.313h3.587l-.467 3.622h-3.12v9.294h6.116c.73 0 1.323-.593 1.323-1.324v-21.351c0-.732-.593-1.325-1.325-1.325z"/></svg>
        Facebook
      </button>

      <p class="register-prompt">
        Don't have an account? <a href="register.html" class="register-link">Sign up</a>
      </p>

    </div>

  </main>

  <script>
    // Theme toggle + persistence
    function toggleTheme() {
      const html = document.documentElement;
      const current = html.getAttribute('data-theme') || 'dark';
      const next = current === 'dark' ? 'light' : 'dark';
      html.setAttribute('data-theme', next);
      localStorage.setItem('nexlearn-theme', next);
    }

    const savedTheme = localStorage.getItem('nexlearn-theme') || 'dark';
    document.documentElement.setAttribute('data-theme', savedTheme);

    // Password visibility toggle
    function togglePassword() {
      const input = document.getElementById('password');
      const toggle = document.querySelector('.password-toggle');
      if (input.type === 'password') {
        input.type = 'text';
        toggle.textContent = '🙈';
      } else {
        input.type = 'password';
        toggle.textContent = '👁️';
      }
    }

    // Form validation + fake success redirect
    const form = document.getElementById('loginForm');
    form.addEventListener('submit', e => {
      e.preventDefault();

      let valid = true;
      const email = document.getElementById('email');
      const password = document.getElementById('password');
      const emailError = document.getElementById('emailError');
      const passwordError = document.getElementById('passwordError');

      // Reset errors
      emailError.style.display = 'none';
      passwordError.style.display = 'none';

      // Email validation
      if (!email.value.trim() || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email.value)) {
        emailError.style.display = 'block';
        valid = false;
      }

      // Password validation
      if (!password.value || password.value.length < 8) {
        passwordError.style.display = 'block';
        valid = false;
      }

      if (valid) {
        // Fake successful login → redirect to dashboard
        form.querySelector('.auth-btn').textContent = 'Signing in...';
        form.querySelector('.auth-btn').disabled = true;

        setTimeout(() => {
          window.location.href = 'dashboard.html';
        }, 1200);
      }
    });

    // Input focus animation helper
    document.querySelectorAll('.form-input').forEach(input => {
      input.addEventListener('focus', () => {
        input.parentElement.style.transform = 'translateY(-4px)';
      });
      input.addEventListener('blur', () => {
        input.parentElement.style.transform = 'translateY(0)';
      });
    });
  </script>
</body>
</html>
